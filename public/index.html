<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>whats-middle · Painel</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#25D366', dark: '#1da851' },
            ink: { 900: '#0b141a', 800: '#111b21', 700: '#16242c', 600: '#1f2c34', 500: '#2a3942' }
          }
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="bg-ink-900 text-slate-200 antialiased">

  <!-- ===================== LOGIN ===================== -->
  <div id="login-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-ink-900/95 backdrop-blur">
    <form id="login-form" class="w-full max-w-sm bg-ink-700 rounded-2xl p-8 shadow-2xl border border-ink-500">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-11 h-11 rounded-xl bg-brand flex items-center justify-center text-ink-900 font-bold text-xl">W</div>
        <div>
          <h1 class="text-lg font-semibold text-white">whats-middle</h1>
          <p class="text-xs text-slate-400">Painel de histórico</p>
        </div>
      </div>
      <label class="block text-sm text-slate-400 mb-1">Usuário</label>
      <input id="login-user" class="w-full mb-4 px-3 py-2 rounded-lg bg-ink-600 border border-ink-500 focus:border-brand outline-none" value="admin" />
      <label class="block text-sm text-slate-400 mb-1">Senha</label>
      <input id="login-pass" type="password" class="w-full mb-5 px-3 py-2 rounded-lg bg-ink-600 border border-ink-500 focus:border-brand outline-none" />
      <p id="login-error" class="hidden text-sm text-red-400 mb-3"></p>
      <button type="submit" class="w-full py-2.5 rounded-lg bg-brand hover:bg-brand-dark text-ink-900 font-semibold transition">Entrar</button>
    </form>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app" class="hidden flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-60 shrink-0 bg-ink-800 border-r border-ink-600 flex flex-col">
      <div class="px-5 py-5 flex items-center gap-3 border-b border-ink-600">
        <div class="w-9 h-9 rounded-lg bg-brand flex items-center justify-center text-ink-900 font-bold">W</div>
        <div>
          <div class="font-semibold text-white leading-tight" id="brand-name">whats-middle</div>
          <div class="text-[11px] text-slate-500">message history</div>
        </div>
      </div>

      <nav id="nav" class="flex-1 px-3 py-4 space-y-1 text-sm"></nav>

      <div class="px-4 py-4 border-t border-ink-600">
        <div class="flex items-center gap-2 text-xs">
          <span id="conn-dot" class="w-2.5 h-2.5 rounded-full bg-slate-500"></span>
          <span id="conn-label" class="text-slate-400">verificando…</span>
        </div>
        <div id="conn-number" class="text-[11px] text-slate-600 mt-1 truncate"></div>
        <button id="logout-btn" class="hidden mt-3 text-xs text-slate-500 hover:text-slate-300">Sair</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col overflow-hidden">
      <header class="h-14 shrink-0 border-b border-ink-600 bg-ink-800/70 backdrop-blur px-6 flex items-center justify-between">
        <h2 id="page-title" class="text-lg font-semibold text-white">Visão geral</h2>
        <div class="flex items-center gap-3">
          <div class="relative">
            <input id="global-search" placeholder="Buscar mensagens, contatos, grupos…"
              class="w-72 px-3 py-1.5 text-sm rounded-lg bg-ink-600 border border-ink-500 focus:border-brand outline-none placeholder-slate-500" />
          </div>
          <span id="status-pill" class="px-3 py-1 rounded-full text-xs bg-ink-600 text-slate-400">—</span>
        </div>
      </header>

      <div id="view" class="flex-1 overflow-y-auto p-6"></div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
